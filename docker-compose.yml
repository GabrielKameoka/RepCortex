version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: repcortex-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: repcortex-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: